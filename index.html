<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .meta-tags {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin: 24px auto;
            max-width: 800px;
            padding: 24px 32px;
        }

        .meta-tags-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #999;
            margin-bottom: 20px;
        }

        .meta-field {
            display: flex;
            align-items: baseline;
            margin-bottom: 16px;
        }

        .meta-field:last-child {
            margin-bottom: 0;
        }

        .meta-field-name {
            font-size: 14px;
            font-weight: 500;
            color: #555;
            white-space: nowrap;
            margin-right: 12px;
        }

        .meta-field-blank {
            flex: 1;
            border-bottom: 1px solid #ccc;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="meta-tags">
        <div class="meta-tags-label">Meta Tags</div>
        <div class="meta-field">
            <span class="meta-field-name">Page Title:</span>
            <span class="meta-field-blank"></span>
        </div>
        <div class="meta-field">
            <span class="meta-field-name">Google Search Description:</span>
            <span class="meta-field-blank"></span>
        </div>
        <div class="meta-field">
            <span class="meta-field-name">Link Share Description:</span>
            <span class="meta-field-blank"></span>
        </div>
    </div>

</body>
</html>
